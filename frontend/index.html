<!DOCTYPE html>
<html>
<head>
    <title>Kubernetes Full Stack Demo</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            margin-top: 100px;
        }

        .box {
            background: white;
            padding: 30px;
            width: 400px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            padding: 10px;
            width: 80%;
        }

        button {
            padding: 10px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>K8s Demo Application</h1>

    <input type="text" id="message" placeholder="Enter message">
    <br>
    <button onclick="sendMessage()">Send</button>

    <h3>Messages from Backend</h3>
    <ul id="messages"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
